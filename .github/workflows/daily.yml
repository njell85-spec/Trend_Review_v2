name: Daily Trend Review

on:
  schedule:
    # 06:30 Asia/Seoul
    - cron: '30 21 * * *'
  workflow_dispatch:
    inputs:
      date:
        description: 'Optional run date YYYY-MM-DD'
        required: false
        type: string
      max_papers:
        description: 'PubMed max papers'
        required: false
        default: '300'
        type: string
      no_notify:
        description: 'Skip Telegram/Kakao notification'
        required: false
        default: false
        type: boolean
      dry_run:
        description: 'Use fixture data'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    env:
      PUBMED_EMAIL: ${{ secrets.PUBMED_EMAIL }}
      PUBMED_API_KEY: ${{ secrets.PUBMED_API_KEY }}
      LLM_PROVIDER: ${{ secrets.LLM_PROVIDER }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      ANTHROPIC_MODEL: ${{ secrets.ANTHROPIC_MODEL }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
      KAKAO_CLIENT_SECRET: ${{ secrets.KAKAO_CLIENT_SECRET }}
      KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
      DASHBOARD_URL: ${{ vars.DASHBOARD_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - run: npm ci

      - name: Run tests
        run: npm test

      - name: Run pipeline
        shell: bash
        env:
          RUN_DATE: ${{ github.event.inputs.date || '' }}
          MAX_PAPERS: ${{ github.event.inputs.max_papers || '300' }}
          NO_NOTIFY: ${{ github.event.inputs.no_notify || 'false' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          ARGS=()
          if [ -n "$RUN_DATE" ]; then ARGS+=(--date "$RUN_DATE"); fi
          if [ -n "$MAX_PAPERS" ]; then ARGS+=(--max-papers "$MAX_PAPERS"); fi
          if [ "$DRY_RUN" = "true" ]; then ARGS+=(--dry-run); fi
          if [ "$NO_NOTIFY" = "true" ]; then ARGS+=(--no-notify); fi
          node src/cli.js "${ARGS[@]}"

      - name: Commit generated reports
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data reports public
          if git diff --cached --quiet; then
            echo "No generated report changes."
          else
            git commit -m "chore: daily trend review output"
            git push
          fi

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - id: deployment
        uses: actions/deploy-pages@v4

      - name: Send notifications
        if: ${{ github.event.inputs.no_notify != 'true' }}
        run: node src/notify/send-latest.js
